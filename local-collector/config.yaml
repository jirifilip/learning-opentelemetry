receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: "node-exporter"
          static_configs:
            - targets:
                - "node-exporter-1:9100"


exporters:
  otlp_http:
    endpoint: "http://remote-opentelemetry-collector:4318"
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [otlp_http]
